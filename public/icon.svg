<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
      .foreground { fill: white; }
      .accent { fill: #3b82f6; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .foreground { fill: black; }
      .accent { fill: #2563eb; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <g transform="translate(90, 90)">
    <!-- Shield shape -->
    <path class="foreground" d="M0,-45 C-15,-45 -30,-35 -30,-20 C-30,5 -15,25 0,45 C15,25 30,5 30,-20 C30,-35 15,-45 0,-45 Z" />
    <!-- Eye symbol in center -->
    <circle class="accent" cx="0" cy="-5" r="8" />
    <circle class="background" cx="0" cy="-5" r="3" />
    <!-- Watch hands (clock-like) -->
    <line class="foreground" x1="0" y1="-5" x2="0" y2="-15" stroke-width="2" stroke-linecap="round" />
    <line class="foreground" x1="0" y1="-5" x2="5" y2="-3" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>